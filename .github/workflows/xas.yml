# 这是一个自动化执行 Node.js 脚本的 workflow
name: Daily Node.js Script

on:
  push:
    branches: [ "master" ]
  schedule:
    # 注意：这是 UTC 时间 20:00，对应 UTC+8 时间的次日凌晨 04:00
    - cron: "0 20 * * *"
  workflow_dispatch: # 添加了这个触发器，允许在 GitHub 网页端手动运行

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # 升级到 v4

    - name: Setup Node.js
      uses: actions/setup-node@v4 # 升级到 v4
      with:
        node-version: 20.x # 升级到 LTS 版本
        cache: 'npm'

    - name: Install dependencies
      run: npm ci # 使用 npm ci 代替 npm i 保证环境一致性

    - name: Execute script
      run: node index.js
      env:
        XIANNIU_USERNAME: ${{ secrets.XIANNIU_USERNAME }}
        XIANNIU_PASSWORD: ${{ secrets.XIANNIU_PASSWORD }}
